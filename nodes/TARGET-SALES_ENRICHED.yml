        join:
          joinCondition: |-
            FROM {{ ref('TARGET', 'STG_SALES_F') }} STG_SALES_F
            INNER JOIN {{ ref('TARGET', 'DIM_CUSTOMERS') }} DIM_CUSTOMERS 
                ON STG_SALES_F.CUSTOMER_ID = DIM_CUSTOMERS.CUSTOMER_ID 
                AND STG_SALES_F.SALE_DATE >= DIM_CUSTOMERS.EFF_START_DATE 
                AND (STG_SALES_F.SALE_DATE <= DIM_CUSTOMERS.EFF_END_DATE OR DIM_CUSTOMERS.EFF_END_DATE IS NULL)
            INNER JOIN {{ ref('TARGET', 'DIM_PRODUCTS') }} DIM_PRODUCTS 
                ON STG_SALES_F.PRODUCT_ID = DIM_PRODUCTS.PRODUCT_ID
