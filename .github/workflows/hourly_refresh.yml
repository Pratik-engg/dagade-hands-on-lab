name: Coalesce Scheduled Refresh
on:
  schedule:
    # Runs at 05:00 UTC every day
    - cron: '0 5 * * *'
  workflow_dispatch: # Allows you to trigger the job manually from GitHub UI

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Coalesce CLI
        run: npm install -g @coalescesoftware/coa

      - name: Trigger Coalesce Job
        env:
          # Assumes you have COA_CONFIG stored in GitHub Secrets
          COA_CONFIG: ${{ secrets.COA_CONFIG }}
        # "coa refresh" triggers a pipeline run in your Coalesce environment
        run: |
          echo "$COA_CONFIG" > coa_config.json
          coa refresh --config coa_config.json --environmentID 8 --jobID 4
