fileVersion: 1
id: "26"
isDisabled: false
metadata:
  defaultStorageLocation: null
  error: null
  nodeMetadataSpec: |-
    capitalized: CREATE SQL
    short: SQL
    plural: SQLs
    tagColor: '#2EB67D'

    deployStrategy: advanced

    config:
    - groupName: 'Options'
      items:
      - type: textBox
        displayName: SQL
        attributeName: SQL1
        syntax: sql 
        isRequired: true

    - groupName: Custom Node For Warehouse Change
      items:     
         
        - type: label
          attributeName: note2
          displayName: 
                       "NOTE:
                       \n
                       Ensure the parameter warehouseName is added in Workspace and 
                       deployment environment  for successful creation of dynamic table.  
                       Refer documentation for more info"
          enableIf: "{%- if parameters == {} or parameters.warehouseName == '' -%} true {%- else -%} false {%- endif -%}"

        - displayName: Warehouse on which to execute Stored Procedure Table
          attributeName: warehouseName
          type: textBox
          default: dev_wh_xs
          isRequired: true

    -systemColumns:

    - displayName: SQL_SEQ
      transform: ''
      dataType: NUMBER IDENTITY
      placement: beginning
      attributeName: isSurrogateKey

    - displayName: SYSTEM_START_DATE
      transform: CAST(CURRENT_TIMESTAMP AS TIMESTAMP)
      dataType: TIMESTAMP
      placement: end
      attributeName: isSystemStartDate
name: SQL_NODE
type: NodeType
